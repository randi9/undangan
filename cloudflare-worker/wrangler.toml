name = "wildcard-proxy"
main = "wildcard-proxy.js"
compatibility_date = "2024-09-01"

# Route: hanya intercept wildcard subdomain
# Root domain (mengundanganda.com) TIDAK di-intercept
routes = [
  { pattern = "*.mengundanganda.com/*", zone_name = "mengundanganda.com" }
]

# Optional (recommended for stable distributed rate-limit counters):
# 1) wrangler kv namespace create "RATE_LIMIT_KV"
# 2) wrangler kv namespace create "RATE_LIMIT_KV" --preview
# 3) Paste the IDs below
#
# [[kv_namespaces]]
# binding = "RATE_LIMIT_KV"
# id = "<production-namespace-id>"
# preview_id = "<preview-namespace-id>"
